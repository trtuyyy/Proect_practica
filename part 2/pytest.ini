[pytest]
testpaths = tests_pytest tests_playwright
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts =
    -v
    --tb=short
    --color=yes
    -p no:warnings
markers =
    unit: unit-тесты логики и данных
    e2e: E2E тесты через Playwright
    slow: медленные тесты
